version: '3.8'

services:
  autonomous_game_studio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
